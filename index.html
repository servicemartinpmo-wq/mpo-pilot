    <!-- Instant loading shell — shown while the JS bundle loads, hidden the moment React mounts -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; }

      body {
        background: #0c1117;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0c1117;
        transition: opacity 0.2s ease;
      }

      #boot-shell.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .boot-logo {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 48px rgba(59,130,246,0.4);
        animation: boot-pulse 2s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%, 100% { box-shadow: 0 0 48px rgba(59,130,246,0.35); }
        50%       { box-shadow: 0 0 64px rgba(59,130,246,0.55); }
      }

      .boot-logo svg {
        width: 28px;
        height: 28px;
        stroke: white;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .boot-wordmark {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.42);
        margin-top: -4px;
      }

      .boot-spinner-track {
        width: 32px;
        height: 32px;
        position: relative;
        margin-top: 4px;
      }

      .boot-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(59,130,246,0.18);
        border-top-color: #3b82f6;
        animation: boot-spin 0.7s linear infinite;
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <!-- Native loading shell — renders instantly, before any JS downloads -->
    <div id="boot-shell">
      <div class="boot-logo">
        <!-- Layers icon (matches the app's feel) -->
        <svg viewBox="0 0 24 24">
          <polygon points="12 2 22 8.5 12 15 2 8.5 12 2"/>
          <polyline points="2 15.5 12 22 22 15.5"/>
          <polyline points="2 11.5 12 18 22 11.5"/>
        </svg>
      </div>
      <div class="boot-wordmark">Martin PMO</div>
      <div class="boot-spinner-track">
        <div class="boot-spinner"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Hide the boot shell as soon as React renders content into #root -->
    <script>
      (function () {
        var shell = document.getElementById('boot-shell');
        if (!shell) return;
        var root  = document.getElementById('root');
        if (!root) return;

        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            shell.classList.add('fade-out');
            setTimeout(function () { shell.style.display = 'none'; }, 220);
          }
        });
        observer.observe(root, { childList: true, subtree: false });

        // Hard safety: hide after 10 s regardless of React state
        setTimeout(function () { shell.style.display = 'none'; }, 10000);
      })();
    </script>
  </body>
</html>
